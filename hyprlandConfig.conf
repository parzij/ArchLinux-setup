# Setup monitors
monitor = eDP-1, 2560x1600@240, 0x0, 1.25
monitor = eDP-2, 2560x1600@240, 0x0, 1.25

# Первая карта - встроенная (для отрисовки интерфейса), вторая - NVIDIA (на подхвате для тяжелых задач)
env = WLR_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card:/dev/dri/by-path/pci-0000:01:00.0-card

env = XCURSOR_THEME,Polarnight-cursors
env = XCURSOR_SIZE,20
env = GTK_THEME,Everforest-B-MB-Dark

xwayland {
    force_zero_scaling = true
}

# Execute your favorite apps at launch
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = swaync
exec = pkill swaybg; swaybg -m fill -i /home/parzij/.config/hypr/samyray_logo.jpg
#exec = pkill swaybg; swaybg -m fill -i /home/parzij/Downloads/NOFQh9F-arch-linux-wallpaper.png
#exec = pkill swaybg; swaybg -m fill -i /home/parzij/Downloads/new-samuray-wallpaper.jpg
#exec-once = mpvpaper -o "loop panscan=1" '*' /home/parzij/Downloads/3462463642/mylivewallpapers-com-Path-Of-The-Samurai-4K.mp4
exec-once = gnome-keyring-daemon --start --components=secrets
# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 0
    col.active_border = rgb(cdd6f4)
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

misc {
    disable_hyprland_logo = yes
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 7
        passes = 3
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    preserve_split = yes
}

master {
    new_status = master
}

device {
    name = compx-2.4g-wireless-receiver
    sensitivity = -0.5
}

windowrule = opacity 0.8 0.8, match:class ^(kitty)$
windowrule = opacity 0.8 0.8, match:class ^(thunar)$

# --- Настройки для Orbit (Сеть и Bluetooth) ---
layerrule = blur on, match:namespace orbit
layerrule = ignore_alpha 0.1, match:namespace orbit
layerrule = animation slide, match:namespace orbit

$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod SHIFT, X, killactive,
bind = $mainMod, L, exec, swaylock
bind = $mainMod, M, exec, wlogout --protocol layer-shell
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = SUPER, S, exec, bash -c 'grim -g "$(slurp)" /home/parzij/Images/screenshots/screenshot_$(date +"%Y%m%d_%H%M%S").png'

# ROG G15 Strix (2021) Specific binds
bind = ,156, exec, rog-control-center
bind = ,211, exec, asusctl profile -n; pkill -SIGRTMIN+8 waybar
bind = ,121, exec, pamixer -t
bind = ,122, exec, pamixer -d 5
bind = ,123, exec, pamixer -i 5
bind = ,256, exec, pamixer --default-source -t
bind = ,232, exec, brightnessctl set 10%-
bind = ,233, exec, brightnessctl set 10%+
bind = ,237, exec, brightnessctl -d asus::kbd_backlight set 33%-
bind = ,238, exec, brightnessctl -d asus::kbd_backlight set 33%+
bind = ,210, exec, asusctl led-mode -n

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
